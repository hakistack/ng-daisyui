name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm run lint

  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm test

  build:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm run build

      - run: npx size-limit --json

  # Rust workspace check + tests. Covers document-engine, image-engine,
  # and the other pure-Rust crates. The `libheif-bridge` crate is
  # excluded from the workspace (targets only wasm32-unknown-emscripten +
  # links against pre-built C libs) — it would need a separate job with
  # emsdk installed, which we defer to the libheif:build path below.
  rust:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            hakistack-engine/target
          key: cargo-${{ hashFiles('hakistack-engine/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --manifest-path hakistack-engine/Cargo.toml --all --check

      - name: cargo clippy
        run: cargo clippy --manifest-path hakistack-engine/Cargo.toml --workspace --all-targets -- -D warnings

      - name: cargo test
        run: npm run engine:test

  # libheif WASM build — needs emscripten + binaryen + the
  # wasm32-unknown-emscripten Rust target. Slower and more brittle than
  # the pure-Rust job, so it runs in parallel with everything else and
  # caches the emsdk install. Failure here does not block merge — the
  # in-tree HEIC support is a perf/size win, and the heic2any fallback
  # keeps the renderer functional without it. Re-evaluate this gating
  # decision once the build has been stable for a few releases.
  libheif:
    needs: install
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Install binaryen (newer wasm-opt)
        run: |
          BINARYEN_VERSION=129
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz" \
            | tar xzf - -C "$HOME"
          echo "$HOME/binaryen-version_${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.68
          actions-cache-folder: emsdk-cache

      - name: Verify toolchain
        run: |
          emcc --version | head -1
          wasm-opt --version
          cmake --version | head -1
          rustup target list --installed | grep emscripten

      - name: Build libheif WASM
        run: npm run libheif:build

      - name: Report bundle size
        run: |
          wasm=projects/hakistack/ng-daisyui/src/lib/wasm/libheif/libheif_wasm_bg.wasm
          echo "::notice title=libheif WASM size::$(du -h "$wasm" | awk '{print $1}') raw, $(gzip -c "$wasm" | wc -c | numfmt --to=iec --suffix=B) gzip"
