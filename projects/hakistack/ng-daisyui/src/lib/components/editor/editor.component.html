<div
  class="hk-editor flex flex-col overflow-hidden rounded-md border border-base-content/25 bg-base-100 transition-colors focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20"
  [class.opacity-60]="effectiveDisabled()"
  [class.pointer-events-none]="effectiveDisabled()"
>
  <hk-editor-toolbar
    [config]="toolbar()"
    [isActive]="isActiveCheck"
    [canRun]="canRunCheck"
    [disabled]="effectiveDisabled()"
    (toolbarCommand)="runCommand($event)"
  />
  <div
    #host
    class="hk-editor__surface px-4 py-3 cursor-text overflow-y-auto text-base-content selection:bg-primary/30 selection:text-inherit"
    [style.min-height]="editorHeight()"
    [attr.aria-label]="ariaLabel() || placeholder() || 'Rich text editor'"
  ></div>
</div>

@if (textPromptOpen()) {
  <dialog class="modal modal-open" role="dialog" aria-labelledby="hk-text-prompt-title" aria-modal="true">
    <div class="modal-box max-w-md">
      <h3 id="hk-text-prompt-title" class="font-semibold text-base mb-1">{{ textPromptTitle() }}</h3>
      @if (textPromptDescription()) {
        <p class="text-xs text-base-content/60 mb-3">{{ textPromptDescription() }}</p>
      }
      <input
        #textPromptInput
        type="text"
        class="input input-bordered w-full"
        autofocus
        [value]="textPromptValue()"
        [placeholder]="textPromptPlaceholder()"
        (input)="textPromptValue.set(textPromptInput.value)"
        (keydown.enter)="resolveTextPrompt('confirm')"
        (keydown.escape)="resolveTextPrompt('cancel')"
      />
      <div class="modal-action mt-4">
        <button type="button" class="btn btn-ghost btn-sm" (click)="resolveTextPrompt('cancel')">Cancel</button>
        @if (textPromptShowSkip()) {
          <button type="button" class="btn btn-ghost btn-sm" (click)="resolveTextPrompt('skip')">{{ textPromptSkipLabel() }}</button>
        }
        <button type="button" class="btn btn-primary btn-sm" (click)="resolveTextPrompt('confirm')">{{ textPromptConfirmLabel() }}</button>
      </div>
    </div>
    <button type="button" class="modal-backdrop" aria-label="Close" (click)="resolveTextPrompt('cancel')"></button>
  </dialog>
}
