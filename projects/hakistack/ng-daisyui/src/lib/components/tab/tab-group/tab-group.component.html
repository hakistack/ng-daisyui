<div ngTabs [class]="containerClass()">
  <!-- Tab List -->
  <div
    ngTabList
    [(selectedTab)]="selectedTab"
    [selectionMode]="selectionMode()"
    [orientation]="orientation()"
    [wrap]="wrap()"
    role="tablist"
    [class]="tabsStyleClass()"
  >
    @for (panel of panels(); track panel.value()) {
      <button ngTab role="tab" [value]="panel.value()" [disabled]="panel.disabled()" [class]="tabButtonClass(panel)">
        {{ panel.label() }}
      </button>
    }
    @if (!isVertical()) {
      <!-- Filler to complete the lifted-tab border (horizontal only) -->
      <div class="tab tab-border-none flex-1 cursor-default"></div>
    }
  </div>

  <!-- Tab Panels -->
  <div [class]="panelContainerClass()">
    @for (panel of panels(); track panel.value()) {
      <div ngTabPanel role="tabpanel" [value]="panel.value()" [class.hidden]="selectedTab() !== panel.value()">
        <ng-template ngTabContent>
          <ng-container [ngTemplateOutlet]="panel.contentTemplateRef()"></ng-container>
        </ng-template>
      </div>
    }
  </div>
</div>
