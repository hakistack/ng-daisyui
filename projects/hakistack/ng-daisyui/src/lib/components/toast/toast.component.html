<div [class]="containerClasses()">
  @for (toast of toasts(); track toast.id) {
    <div
      [class]="getToastClasses(toast)"
      [attr.role]="toast.sticky ? 'status' : 'alert'"
      [attr.aria-live]="toast.sticky ? 'polite' : 'assertive'"
      [attr.aria-atomic]="true"
      [attr.aria-label]="toast.summary"
      [attr.tabindex]="toast.tapToDismiss || toast.onTap ? 0 : null"
      (mouseenter)="onMouseEnter(toast)"
      (mouseleave)="onMouseLeave(toast)"
      (click)="onToastClick(toast)"
      (keydown.enter)="onToastClick(toast)"
    >
      <!-- Icon -->
      <svg [lucideIcon]="getIcon(toast.severity)" [size]="20" class="toast-icon"></svg>

      <!-- Content -->
      <div class="toast-content">
        <span class="toast-summary">{{ toast.summary }}</span>
        @if (toast.detail) {
          <p class="toast-detail">{{ toast.detail }}</p>
        }

        <!-- Action buttons -->
        @if (toast.actions?.length) {
          <div class="toast-actions">
            @for (action of toast.actions; track $index) {
              <button type="button" [class]="getActionButtonClass(action.style)" (click)="handleActionClick(toast, action, $event)">
                {{ action.label }}
              </button>
            }
          </div>
        }
      </div>

      <!-- Dismiss button -->
      <button
        type="button"
        class="btn btn-sm btn-circle btn-ghost toast-dismiss"
        aria-label="Dismiss notification"
        (click)="dismiss(toast.id); $event.stopPropagation()"
      >
        <svg lucideX [size]="16"></svg>
      </button>

      <!-- Progress bar -->
      @if (toast.progressBar && !toast.sticky) {
        <div
          class="toast-progress"
          [class.paused]="toast.isPaused"
          [style.width.%]="toast.progressTarget"
          [style]="'--progress-duration:' + toast.transitionDuration + 'ms'"
        ></div>
      }
    </div>
  }
</div>
